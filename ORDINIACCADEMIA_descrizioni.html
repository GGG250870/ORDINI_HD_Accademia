<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a1a1a">
<title>HD Nails Ordini - Dettagli Prodotto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blk:#1a1a1a;--gold:#d4a574;--red:#c0392b;--wa:#25D366;--wa2:#128C7E;--grey:#f2f2f7;--wh:#fff;--border:#e5e5ea;--txt:#1c1c1e;--txt2:#3a3a3c;--txt3:#8e8e93;--H:56px;--C:50px;--B:60px}
html,body{height:100%;background:var(--grey);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--txt);overflow:hidden;font-size:15px}
button,input,textarea{font-family:inherit}
#hdr{position:fixed;top:0;left:0;right:0;height:var(--H);background:var(--blk);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:100;padding-top:env(safe-area-inset-top)}
.logo{font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1.5px;line-height:1.1;flex-shrink:0}.logo small{display:block;font-size:8px;color:#777;font-weight:400;letter-spacing:.3px}
.sw{flex:1;position:relative}.sw span{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}.sw input{width:100%;background:#2c2c2e;border:0;border-radius:10px;padding:9px 12px 9px 32px;font-size:15px;color:#fff;outline:0}.sw input::placeholder{color:#777}
#qclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:0;color:#777;font-size:18px;cursor:pointer;display:none}
#cfab{background:var(--wa);border:0;border-radius:12px;padding:8px 12px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px}#cbadge{background:var(--red);color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;padding:0 3px}
#chips{position:fixed;top:var(--H);left:0;right:0;height:var(--C);background:var(--wh);border-bottom:1px solid var(--border);z-index:99;overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;gap:7px;padding:0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}#chips::-webkit-scrollbar{display:none}.chip{background:var(--grey);border:1.5px solid var(--border);border-radius:20px;padding:6px 11px;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0;color:var(--txt);line-height:1}.chip.on{background:var(--blk);border-color:var(--blk);color:var(--gold);font-weight:700}.cnt{opacity:.6;font-size:11px}
#main{position:fixed;top:calc(var(--H) + var(--C));left:0;right:0;bottom:var(--B);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 0}#lbl{font-size:12px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.card{background:var(--wh);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;flex-direction:column;position:relative;user-select:none}.ci{height:118px;display:flex;align-items:center;justify-content:center;background:#fafafa;overflow:hidden;padding:6px;cursor:pointer;position:relative}.ci:after{content:'Dettagli';position:absolute;top:7px;right:7px;background:rgba(26,26,26,.72);color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:4px 6px}.ci img{max-height:106px;max-width:100%;object-fit:contain}.ph{font-size:30px;opacity:.3}.bge{position:absolute;top:7px;left:7px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;z-index:2}.cb{padding:8px 9px 4px;flex:1;display:flex;flex-direction:column}.cn{font-size:12px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;min-height:31px}.pr{font-size:14px;font-weight:700;color:var(--red);margin-top:auto}.op{font-size:10px;color:var(--txt3);text-decoration:line-through;display:block}.cf{padding:7px 9px 9px;display:flex;align-items:center;gap:6px}.qb{display:flex;align-items:center;gap:4px;background:var(--grey);border-radius:20px;padding:3px 6px;flex-shrink:0}.qmn,.qpl{width:30px;height:30px;border-radius:50%;border:0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}.qmn{background:#e2e2e2;color:#444}.qpl{background:var(--gold);color:#fff}.qn{min-width:18px;text-align:center;font-size:14px;font-weight:700}.ab{flex:1;border:0;border-radius:10px;padding:9px 4px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;min-height:44px;line-height:1}.ab.off{background:var(--wa);color:#fff}.ab.on{background:#aaa;color:#fff}
#lmore{text-align:center;padding:14px 0 10px;display:none}#lmbtn{background:var(--blk);color:var(--gold);border:0;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer}#nores,#loading{text-align:center;padding:50px 20px;color:var(--txt3);grid-column:1/-1}
#bot{position:fixed;bottom:0;left:0;right:0;height:var(--B);background:var(--wh);border-top:1px solid var(--border);display:none;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;padding-bottom:env(safe-area-inset-bottom)}.bi strong{display:block;font-size:15px}.bi span{font-size:12px;color:var(--txt3)}#obtn{background:var(--blk);color:var(--gold);border:0;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer}
#cov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}#cov.on{opacity:1;pointer-events:all}.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--wh);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,0,.67,0);display:flex;flex-direction:column;max-height:92vh}.sheet.on{transform:translateY(0)}.pill{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px}.shdr{padding:4px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.shdr h2{font-size:17px}.shdr button{background:none;border:0;font-size:22px;color:var(--txt3);cursor:pointer;padding:4px;min-width:44px;min-height:44px}.sbody{flex:1;overflow-y:auto;padding:10px 16px;-webkit-overflow-scrolling:touch}.ce{text-align:center;padding:38px 20px;color:var(--txt3)}.citem{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}.cthumb{width:50px;height:50px;object-fit:contain;border-radius:8px;background:#f5f5f5;flex-shrink:0}.cinf{flex:1;min-width:0}.cname{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cprice{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}.cqrow{display:flex;align-items:center;gap:5px}.cqm,.cqp{width:28px;height:28px;border-radius:50%;border:0;font-size:16px;font-weight:700;cursor:pointer}.cqm{background:#eee;color:#555}.cqp{background:var(--gold);color:#fff}.cqv{min-width:20px;text-align:center;font-size:13px;font-weight:700}.cqt{font-size:11px;color:var(--txt3)}.cdel{background:none;border:0;color:#ccc;font-size:18px;cursor:pointer;padding:6px;min-width:36px}.sfoot{padding:12px 16px 18px;border-top:1px solid var(--border)}.tbox{background:var(--grey);border-radius:12px;padding:12px;margin-bottom:10px}.tr{display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);padding:2px 0}.tr.bon{color:#25a244;font-weight:600}.tr.grand{font-size:16px;font-weight:700;color:var(--txt);border-top:1px solid var(--border);margin-top:5px;padding-top:7px}.field{width:100%;background:var(--grey);border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:14px;outline:0;margin-bottom:8px}.field:focus{border-color:var(--gold)}textarea.field{resize:none;height:56px}.abtns{display:flex;flex-direction:column;gap:8px}.abtn{width:100%;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;min-height:50px}.bwa{background:var(--wa2);color:#fff}.bml{background:var(--blk);color:var(--gold)}.bpr{background:#f0f0f0;color:var(--blk)}.bcl{background:none;border:1px solid var(--border);color:var(--txt3);font-size:13px;padding:10px}
#pdlg{z-index:250}.pinfo{padding:12px 16px 18px;overflow-y:auto}.pimg{height:210px;background:#fafafa;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}.pimg img{max-width:100%;max-height:190px;object-fit:contain}.pname{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:5px}.pcat{font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}.pprice{font-size:18px;font-weight:800;color:var(--red);margin-bottom:12px}.pdesc{font-size:15px;line-height:1.45;color:var(--txt2);background:var(--grey);border-radius:12px;padding:12px;margin-bottom:12px}.plink{display:block;text-align:center;color:var(--txt3);font-size:12px;text-decoration:none;margin-top:8px}
#psh{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:flex-end}#psh.on{display:flex}.pdiv{background:var(--wh);width:100%;border-radius:20px 20px 0 0;max-height:95vh;display:flex;flex-direction:column}.phdr{padding:14px 16px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}.phdr h3{flex:1;font-size:15px}.pbtn{background:var(--gold);color:var(--blk);border:0;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}.pclose{background:none;border:0;color:var(--txt3);font-size:22px;cursor:pointer;min-width:44px}.pbody{flex:1;overflow-y:auto;padding:16px}.odoc{font-family:Arial,sans-serif;font-size:12px;color:#111}.odoc h1{font-size:22px;margin-bottom:3px}.odoc .meta{color:#777;margin-bottom:14px}.odoc .cust{background:#f8f8f8;padding:10px;border-radius:8px;margin:10px 0}.odoc table{width:100%;border-collapse:collapse;margin-top:10px}.odoc th,.odoc td{border-bottom:1px solid #ddd;padding:7px 4px;text-align:left}.odoc th{font-size:10px;text-transform:uppercase;color:#777}.odoc .r{text-align:right}.odoc .tot{margin-top:14px;text-align:right;font-weight:bold;font-size:14px}
@media print{body{overflow:visible;background:#fff}#hdr,#chips,#main,#bot,#cov,#csh,#pdlg,.phdr{display:none!important}#psh{position:static;display:block!important;background:#fff}.pdiv{max-height:none;border-radius:0}.pbody{overflow:visible;padding:0}}
</style>
</head>
<body>
<header id="hdr"><div class="logo">HD NAILS<small>ACCADEMIA SAVONA</small></div><div class="sw"><span>🔎</span><input id="q" type="search" placeholder="Cerca prodotto..." oninput="onSearch(this.value)"><button id="qclear" onclick="clearSearch()">×</button></div><button id="cfab" onclick="openCart()">🛒 <span id="cbadge">0</span></button></header>
<div id="chips"><button class="chip on" data-cat="ALL" onclick="filterCat('ALL',this)">🛍️ Tutti</button></div>
<div id="main" onscroll="onScroll(this)"><div id="lbl">Caricamento prodotti...</div><div id="grid"><div id="loading">Caricamento catalogo HD Nails…</div></div><div id="lmore"><button id="lmbtn" onclick="loadMore()">Carica altri ↓</button></div><div style="height:8px"></div></div>
<div id="bot"><div class="bi"><strong id="btot">€0,00</strong><span id="bitem">0 articoli</span></div><button id="obtn" onclick="openCart()">Vedi ordine →</button></div>
<div id="cov" onclick="closeAll()"></div>
<div id="csh" class="sheet"><div class="pill"></div><div class="shdr"><h2>🛒 Il tuo ordine</h2><button onclick="closeCart()">×</button></div><div class="sbody" id="sbody"></div><div class="sfoot"><div class="tbox" id="tbox"></div><input id="cust" class="field" placeholder="Ragione sociale o dati spedizione *"><textarea id="note" class="field" placeholder="Note ordine (opzionale)..."></textarea><div class="abtns"><button class="abtn bwa" onclick="goWA()">💬 Invia su WhatsApp</button><button class="abtn bml" onclick="goMail()">📧 Invia per Email</button><button class="abtn bpr" onclick="openPrint()">📄 Genera PDF / Stampa</button><button class="abtn bcl" onclick="clearCart()">🗑️ Svuota carrello</button></div></div></div>
<div id="pdlg" class="sheet"><div class="pill"></div><div class="shdr"><h2>Dettaglio prodotto</h2><button onclick="closeProduct()">×</button></div><div class="pinfo"><div class="pimg" id="pdimg"></div><div class="pname" id="pdname"></div><div class="pcat" id="pdcat"></div><div class="pprice" id="pdprice"></div><div class="pdesc" id="pddesc"></div><button id="pdadd" class="ab off" style="width:100%;font-size:15px">+ Carrello</button><a id="pdlink" class="plink" target="_blank" rel="noopener">Apri scheda prodotto sul sito</a></div></div>
<div id="psh"><div class="pdiv"><div class="phdr"><h3>📄 Anteprima ordine</h3><button class="pbtn" onclick="window.print()">Stampa / Salva PDF</button><button class="pclose" onclick="closePrint()">×</button></div><div class="pbody" id="pbody"></div></div></div>
<script>
var ORIGINAL_BLOB='c455e92c8b548620ee8eea8ed1d067ebd485bbe3';
var P=[],cart={},cat='ALL',q='',filt=[],vis=0,PG=40;
var CI={'Gel da Ricostruzione':'💅','Base Gel & Semipermanente':'💜','Smalti Semipermanenti':'🎨','Color Gel':'🌈','Acrygel':'✨','Preparatori & Liquidi':'🧴','Lucidi Top Gloss':'🌟','Dual Form & Tip':'💎','Attrezzature':'🔧','Lime & Buffer':'📋','Nail Art & Decorazioni':'🌸','Trattamento Mani':'🤲','Pedicure':'🦶','Kit in Offerta':'🎁'};
function E(s){return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function fm(n){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n||0)}
function desc(p){return 'Scheda prodotto: '+(p.nome||'Prodotto')+'. Categoria: '+(p.cat||'HD Nails')+'. Tocca il pulsante sotto per aggiungerlo all’ordine oppure apri la scheda prodotto ufficiale per consultare la descrizione completa, caratteristiche e modalità d’uso.'}
function readUTF8(b64){var bin=atob(b64.replace(/\s/g,'')),arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(arr)}
async function loadData(){try{var r=await fetch('https://api.github.com/repos/GGG250870/ORDINI_HD_Accademia/git/blobs/'+ORIGINAL_BLOB);var j=await r.json();var html=readUTF8(j.content);var m=html.match(/var P=(\[.*?\]);\s*var /s);if(!m)throw new Error('catalogo non trovato');P=JSON.parse(m[1]);buildChips();render()}catch(e){document.getElementById('grid').innerHTML='<div id="nores"><b>⚠️</b>Catalogo non caricato. Verifica connessione e ricarica la pagina.</div>';document.getElementById('lbl').textContent='Errore caricamento'}}
function buildChips(){var c={},h='<button class="chip on" data-cat="ALL" onclick="filterCat(\'ALL\',this)">🛍️ Tutti <span class="cnt">'+P.length+'</span></button>';P.forEach(function(p){c[p.cat]=(c[p.cat]||0)+1});Object.keys(c).forEach(function(k){h+='<button class="chip" data-cat="'+E(k)+'" onclick="filterCat(\''+String(k).replace(/'/g,"\\'")+'\',this)">'+(CI[k]||'•')+' '+E(k)+' <span class="cnt">'+c[k]+'</span></button>'});document.getElementById('chips').innerHTML=h}
function getFilt(){var ql=q.toLowerCase().trim();return P.filter(function(p){return (cat==='ALL'||p.cat===cat)&&(!ql||p.nome.toLowerCase().indexOf(ql)!==-1||p.cat.toLowerCase().indexOf(ql)!==-1)})}
function mkCard(p){var qty=cart[p.id]||0,inC=qty>0,d=document.createElement('div');d.className='card';var ci=document.createElement('div');ci.className='ci';ci.onclick=function(){openProduct(p.id)};if(p.img){var im=document.createElement('img');im.loading='lazy';im.alt=p.nome;im.src=p.img;im.onerror=function(){ci.innerHTML='<div class="ph">💅</div>'};ci.appendChild(im)}else ci.innerHTML='<div class="ph">💅</div>';d.appendChild(ci);if(p.promo){var bg=document.createElement('div');bg.className='bge';bg.textContent=p.promo;d.appendChild(bg)}var cb=document.createElement('div');cb.className='cb';cb.innerHTML='<div class="cn">'+E(p.nome)+'</div><div class="pr">'+E(p.prezzo_str)+(p.old_prezzo?'<span class="op">'+E(p.old_str)+'</span>':'')+'</div>';d.appendChild(cb);var cf=document.createElement('div');cf.className='cf';cf.innerHTML='<div class="qb"><button class="qmn" onclick="chQ('+p.id+',-1)">−</button><span class="qn" id="qn'+p.id+'">'+qty+'</span><button class="qpl" onclick="chQ('+p.id+',1)">+</button></div><button class="ab '+(inC?'on':'off')+'" id="ab'+p.id+'" onclick="chQ('+p.id+',1)">'+(inC?'✓ Aggiunto':'+ Carrello')+'</button>';d.appendChild(cf);return d}
function render(){filt=getFilt();vis=0;var grid=document.getElementById('grid');grid.innerHTML='';document.getElementById('lbl').innerHTML=(cat==='ALL'?'🛍️ Tutti i prodotti':(CI[cat]||'')+' '+E(cat))+(filt.length?' <span style="font-weight:400;color:var(--txt3)">('+filt.length+')</span>':'');if(!filt.length){grid.innerHTML='<div id="nores"><b>🔎</b>Nessun risultato</div>';document.getElementById('lmore').style.display='none';return}loadMore()}
function loadMore(){var grid=document.getElementById('grid'),prev=vis;vis=Math.min(vis+PG,filt.length);var fr=document.createDocumentFragment();for(var i=prev;i<vis;i++)fr.appendChild(mkCard(filt[i]));grid.appendChild(fr);var lm=document.getElementById('lmore');if(vis<filt.length){lm.style.display='block';document.getElementById('lmbtn').textContent='Carica altri '+Math.min(PG,filt.length-vis)+' ↓'}else lm.style.display='none'}
function onScroll(el){if(el.scrollHeight-el.scrollTop-el.clientHeight<250&&vis<filt.length)loadMore()}
function filterCat(c,btn){cat=c;document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on')});if(btn){btn.classList.add('on');btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}render();document.getElementById('main').scrollTop=0}
function onSearch(v){q=v;document.getElementById('qclear').style.display=v?'block':'none';if(v){cat='ALL';document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on')});var ac=document.querySelector('[data-cat="ALL"]');if(ac)ac.classList.add('on')}render()}
function clearSearch(){document.getElementById('q').value='';onSearch('')}
function chQ(id,d){var n=Math.max(0,(cart[id]||0)+d);if(n===0)delete cart[id];else cart[id]=n;var qn=document.getElementById('qn'+id),ab=document.getElementById('ab'+id);if(qn)qn.textContent=n;if(ab){ab.textContent=n?'✓ Aggiunto':'+ Carrello';ab.className='ab '+(n?'on':'off')}updBadge();if(document.getElementById('csh').classList.contains('on'))renderCart()}
function updBadge(){var tot=0,sub=0;Object.keys(cart).forEach(function(id){tot+=cart[id];sub+=P[id].prezzo*cart[id]});document.getElementById('cbadge').textContent=tot;var bot=document.getElementById('bot');if(tot>0){bot.style.display='flex';document.getElementById('btot').textContent=fm(sub);document.getElementById('bitem').textContent=tot+(tot===1?' articolo':' articoli')}else bot.style.display='none'}
function openCart(){renderCart();document.getElementById('csh').classList.add('on');document.getElementById('cov').classList.add('on')}function closeCart(){document.getElementById('csh').classList.remove('on');document.getElementById('cov').classList.remove('on')}
function renderCart(){var sb=document.getElementById('sbody'),tb=document.getElementById('tbox'),ids=Object.keys(cart);if(!ids.length){sb.innerHTML='<div class="ce"><b>🛒</b><br>Nessun prodotto aggiunto</div>';tb.innerHTML='';return}var sub=0,h='';ids.forEach(function(id){var p=P[id],qty=cart[id],line=p.prezzo*qty;sub+=line;h+='<div class="citem">'+(p.img?'<img class="cthumb" src="'+p.img+'" loading="lazy">':'<div class="cthumb"></div>')+'<div class="cinf"><div class="cname">'+E(p.nome)+'</div><div class="cprice">'+p.prezzo_str+'</div><div class="cqrow"><button class="cqm" onclick="chQ('+id+',-1)">−</button><span class="cqv">'+qty+'</span><button class="cqp" onclick="chQ('+id+',1)">+</button><span class="cqt">= '+fm(line)+'</span></div></div><button class="cdel" onclick="delItem('+id+')">×</button></div>'});sb.innerHTML=h;var bon=sub*.10,tot=ids.reduce(function(a,id){return a+cart[id]},0);tb.innerHTML='<div class="tr"><span>Subtotale ('+tot+' art.)</span><span>'+fm(sub)+'</span></div><div class="tr bon"><span>🎁 Bonus 10% in prodotto</span><span>+'+fm(bon)+'</span></div><div class="tr grand"><span>Totale</span><span>'+fm(sub)+'</span></div>'}
function delItem(id){delete cart[id];render();updBadge();renderCart()}function clearCart(){cart={};updBadge();render();renderCart();closeCart()}
function openProduct(id){var p=P[id];if(!p)return;document.getElementById('pdimg').innerHTML=p.img?'<img src="'+p.img+'" alt="'+E(p.nome)+'">':'<div class="ph">💅</div>';document.getElementById('pdname').textContent=p.nome;document.getElementById('pdcat').textContent=p.cat;document.getElementById('pdprice').textContent=p.prezzo_str;document.getElementById('pddesc').textContent=desc(p);document.getElementById('pdadd').onclick=function(){chQ(id,1);closeProduct()};var a=document.getElementById('pdlink');a.href=p.link||'#';a.style.display=p.link?'block':'none';document.getElementById('pdlg').classList.add('on');document.getElementById('cov').classList.add('on')}
function closeProduct(){document.getElementById('pdlg').classList.remove('on');document.getElementById('cov').classList.remove('on')}function closeAll(){closeProduct();closeCart()}
function customerRequired(){var c=document.getElementById('cust');if(!c.value.trim()){alert('Inserisci ragione sociale o dati di spedizione prima di inviare.');c.focus();return false}return true}
function orderText(){var ids=Object.keys(cart),sub=0,msg='*ORDINE HD NAILS*\nAccademia di Savona\n\nCliente / spedizione: '+document.getElementById('cust').value.trim()+'\n\n';ids.forEach(function(id){var p=P[id],qty=cart[id],line=p.prezzo*qty;sub+=line;msg+=qty+'x '+p.nome+' = '+fm(line)+'\n'});var bon=sub*.10;msg+='\nSubtotale: '+fm(sub)+'\nBonus 10% in prodotto: +'+fm(bon)+'\nTOTALE: '+fm(sub);var n=document.getElementById('note').value.trim();if(n)msg+='\n\nNote: '+n;msg+='\n\nData: '+new Date().toLocaleDateString('it-IT');return msg}
function hasCart(){if(!Object.keys(cart).length){alert('Aggiungi prodotti al carrello prima di inviare.');return false}return true}
function goWA(){if(!hasCart()||!customerRequired())return;window.open('https://wa.me/?text='+encodeURIComponent(orderText()))}
function goMail(){if(!hasCart()||!customerRequired())return;window.open('mailto:?subject='+encodeURIComponent('Ordine HD Nails '+new Date().toLocaleDateString('it-IT'))+'&body='+encodeURIComponent(orderText()))}
function openPrint(){if(!hasCart()||!customerRequired())return;var ids=Object.keys(cart),sub=0,rows='';ids.forEach(function(id){var p=P[id],qty=cart[id],line=p.prezzo*qty;sub+=line;rows+='<tr><td>'+E(p.nome)+'</td><td>'+E(p.cat)+'</td><td class="r">'+p.prezzo_str+'</td><td class="r">'+qty+'</td><td class="r">'+fm(line)+'</td></tr>'});var bon=sub*.10;document.getElementById('pbody').innerHTML='<div class="odoc"><h1>HD NAILS®</h1><div class="meta">Ordine Accademia di Savona - '+new Date().toLocaleDateString('it-IT')+'</div><div class="cust"><b>Cliente / spedizione</b><br>'+E(document.getElementById('cust').value)+'</div><table><thead><tr><th>Prodotto</th><th>Categoria</th><th class="r">Prezzo</th><th class="r">Q</th><th class="r">Tot.</th></tr></thead><tbody>'+rows+'</tbody></table><div class="tot">Subtotale: '+fm(sub)+'<br>Bonus 10% in prodotto: +'+fm(bon)+'<br>Totale ordine: '+fm(sub)+'</div></div>';closeCart();document.getElementById('psh').classList.add('on')}
function closePrint(){document.getElementById('psh').classList.remove('on')}
loadData();
</script>
