<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a1a1a">
<title>HD Nails&#174; Ordini</title>
<style>
/* ── RESET ─────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blk:#1a1a1a;--gold:#d4a574;--red:#c0392b;
  --wa:#25D366;--wa2:#128C7E;
  --grey:#f2f2f7;--wh:#fff;--border:#e5e5ea;
  --txt:#1c1c1e;--txt2:#3a3a3c;--txt3:#8e8e93;
  --H:56px;--C:50px;--B:60px;
}
html{height:100%;background:var(--grey)}
body{height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  font-size:15px;color:var(--txt)}

/* ── HEADER ─────────────────────────────── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--H);
  background:var(--blk);display:flex;align-items:center;gap:10px;
  padding:0 14px;z-index:100;padding-top:env(safe-area-inset-top)}
.logo{font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1.5px;flex-shrink:0;line-height:1.1}
.logo small{display:block;font-size:8px;color:#666;font-weight:400;letter-spacing:.3px}
.sw{flex:1;position:relative}
.sw span{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
#q{width:100%;background:#2c2c2e;border:none;border-radius:10px;
  padding:9px 12px 9px 32px;font-size:15px;color:#fff;outline:none;
  -webkit-appearance:none}
#q::placeholder{color:#636366}
#qclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#636366;font-size:18px;cursor:pointer;display:none}
#cfab{background:var(--wa);border:none;border-radius:12px;padding:8px 12px;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;gap:4px}
#cbadge{background:var(--red);color:#fff;border-radius:50%;min-width:18px;height:18px;
  font-size:10px;font-weight:900;display:inline-flex;align-items:center;
  justify-content:center;padding:0 3px}

/* ── CHIPS ──────────────────────────────── */
#chips{position:fixed;top:var(--H);left:0;right:0;height:var(--C);
  background:var(--wh);border-bottom:1px solid var(--border);z-index:99;
  overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;
  gap:7px;padding:0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{background:var(--grey);border:1.5px solid var(--border);border-radius:20px;
  padding:6px 11px;font-size:13px;white-space:nowrap;cursor:pointer;
  flex-shrink:0;color:var(--txt);line-height:1}
.chip.on{background:var(--blk);border-color:var(--blk);color:var(--gold);font-weight:700}
.cnt{opacity:.6;font-size:11px}

/* ── SCROLL AREA ────────────────────────── */
#main{position:fixed;top:calc(var(--H) + var(--C));left:0;right:0;
  bottom:var(--B);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 0}

#lbl{font-size:12px;font-weight:600;color:var(--txt3);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── GRID ───────────────────────────────── */
#grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ── CARD ───────────────────────────────── */
.card{background:var(--wh);border-radius:14px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;flex-direction:column;
  position:relative;-webkit-user-select:none;user-select:none}
.ci{height:118px;display:flex;align-items:center;justify-content:center;
  background:#fafafa;overflow:hidden;padding:6px}
.ci img{max-height:106px;max-width:100%;object-fit:contain}
.ci .ph{font-size:30px;opacity:.3}
.bge{position:absolute;top:7px;left:7px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.cb{padding:8px 9px 4px;flex:1;display:flex;flex-direction:column}
.cn{font-size:12px;font-weight:600;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:3px;min-height:31px}
.pr{font-size:14px;font-weight:700;color:var(--red);margin-top:auto}
.op{font-size:10px;color:var(--txt3);text-decoration:line-through;display:block}
.cf{padding:7px 9px 9px;display:flex;align-items:center;gap:6px}
.qb{display:flex;align-items:center;gap:4px;background:var(--grey);
  border-radius:20px;padding:3px 6px;flex-shrink:0}
.qmn,.qpl{width:30px;height:30px;border-radius:50%;border:none;
  font-size:20px;line-height:1;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-weight:700}
.qmn{background:#e2e2e2;color:#444}
.qpl{background:var(--gold);color:#fff}
.qn{min-width:18px;text-align:center;font-size:14px;font-weight:700}
.ab{flex:1;border:none;border-radius:10px;padding:9px 4px;font-size:12px;
  font-weight:700;cursor:pointer;text-align:center;min-height:44px;line-height:1}
.ab.off{background:var(--wa);color:#fff}
.ab.on{background:#aaa;color:#fff}

/* ── LOAD MORE ──────────────────────────── */
#lmore{text-align:center;padding:14px 0 6px;display:none}
#lmbtn{background:var(--blk);color:var(--gold);border:none;border-radius:12px;
  padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer}

/* ── NO RESULTS ─────────────────────────── */
#nores{text-align:center;padding:60px 20px;color:var(--txt3);display:none;
  grid-column:1/-1}
#nores b{font-size:36px;display:block;margin-bottom:8px}

/* ── BOTTOM BAR ─────────────────────────── */
#bot{position:fixed;bottom:0;left:0;right:0;height:var(--B);
  background:var(--wh);border-top:1px solid var(--border);
  display:none;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bi strong{display:block;font-size:15px;font-weight:700}
.bi span{font-size:12px;color:var(--txt3)}
#obtn{background:var(--blk);color:var(--gold);border:none;border-radius:12px;
  padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer}

/* ── CART OVERLAY & SHEET ───────────────── */
#cov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .22s}
#cov.on{opacity:1;pointer-events:all}
#csh{position:fixed;left:0;right:0;bottom:0;background:var(--wh);
  border-radius:20px 20px 0 0;z-index:201;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.67,0);
  display:flex;flex-direction:column;max-height:92vh}
#csh.on{transform:translateY(0)}
.pill{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px}
.shdr{padding:4px 16px 10px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border)}
.shdr h2{font-size:17px;font-weight:700}
.shdr button{background:none;border:none;font-size:22px;color:var(--txt3);
  cursor:pointer;padding:4px;min-width:44px;min-height:44px}
.sbody{flex:1;overflow-y:auto;padding:10px 16px;-webkit-overflow-scrolling:touch}
.ce{text-align:center;padding:40px 20px;color:var(--txt3);font-size:15px}
.ce b{font-size:40px;display:block;margin-bottom:8px}
.citem{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);
  align-items:center}
.cthumb{width:50px;height:50px;object-fit:contain;border-radius:8px;
  background:#f5f5f5;flex-shrink:0}
.cthph{width:50px;height:50px;border-radius:8px;background:#f5f5f5;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.cinf{flex:1;min-width:0}
.cname{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprice{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
.cqrow{display:flex;align-items:center;gap:5px}
.cqm,.cqp{width:28px;height:28px;border-radius:50%;border:none;
  font-size:16px;font-weight:700;cursor:pointer;display:flex;
  align-items:center;justify-content:center}
.cqm{background:#eee;color:#555}
.cqp{background:var(--gold);color:#fff}
.cqv{min-width:20px;text-align:center;font-size:13px;font-weight:700}
.cqt{font-size:11px;color:var(--txt3)}
.cdel{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;
  padding:6px;flex-shrink:0;min-width:36px;min-height:36px}
.sfoot{padding:12px 16px 18px;border-top:1px solid var(--border)}
.tbox{background:var(--grey);border-radius:12px;padding:12px;margin-bottom:10px}
.tr{display:flex;justify-content:space-between;font-size:13px;color:var(--txt2);padding:2px 0}
.tr.bon{color:#25a244;font-weight:600}
.tr.grand{font-size:16px;font-weight:700;color:var(--txt);
  border-top:1px solid var(--border);margin-top:5px;padding-top:7px}
#note{width:100%;background:var(--grey);border:1.5px solid var(--border);
  border-radius:10px;padding:10px;font-size:14px;resize:none;height:56px;
  font-family:inherit;outline:none;margin-bottom:10px;-webkit-appearance:none}
#note:focus{border-color:var(--gold)}
.abtns{display:flex;flex-direction:column;gap:8px}
.abtn{width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;min-height:50px}
.abtn:active{opacity:.85}
.bwa{background:var(--wa2);color:#fff}
.bml{background:var(--blk);color:var(--gold)}
.bpr{background:#f0f0f0;color:var(--blk)}
.bcl{background:none;border:1px solid var(--border);color:var(--txt3);font-size:13px;padding:10px}

/* ── PRINT SHEET ────────────────────────── */
#psh{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);
  display:none;align-items:flex-end}
#psh.on{display:flex}
.pdiv{background:var(--wh);width:100%;border-radius:20px 20px 0 0;
  max-height:95vh;display:flex;flex-direction:column}
.phdr{padding:14px 16px 10px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border)}
.phdr h3{flex:1;font-size:15px;font-weight:700}
.pbtn{background:var(--gold);color:var(--blk);border:none;border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
.pclose{background:none;border:none;color:var(--txt3);font-size:22px;
  cursor:pointer;min-width:44px;min-height:44px}
.pbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* ── ORDER DOC (stampabile) ─────────────── */
.odoc{font-family:Arial,sans-serif;font-size:12px;color:#111}
.oh{display:flex;justify-content:space-between;align-items:flex-start;
  padding-bottom:10px;border-bottom:3px solid #111;margin-bottom:14px}
.obrand{font-size:18px;font-weight:900;letter-spacing:2px}
.obrand em{color:#d4a574;font-style:normal}
.osub{font-size:9px;color:#888;margin-top:2px}
.ometa{text-align:right;font-size:10px;color:#666}
.onum{font-size:13px;font-weight:700;color:#111}
.ofl{display:grid;grid-template-columns:1fr 1fr;gap:8px;
  background:#f8f8f8;border-radius:6px;padding:10px;margin-bottom:14px}
.ofl label{font-size:8px;color:#888;text-transform:uppercase;display:block;margin-bottom:1px}
.ofl input{width:100%;border:none;border-bottom:1px solid #ddd;background:none;
  font-size:12px;padding:2px 0;font-family:inherit;outline:none;color:#111}
.odoc table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.odoc th{background:#111;color:#d4a574;padding:5px 6px;text-align:left;
  font-size:9px;text-transform:uppercase}
.odoc td{padding:5px 6px;border-bottom:1px solid #f0f0f0}
.odoc tr:nth-child(even) td{background:#fafafa}
td.r{text-align:right}td.c{text-align:center}
.totdiv{display:flex;justify-content:flex-end}
.totbox{width:210px}
.trow{display:flex;justify-content:space-between;padding:3px 0;
  border-bottom:1px solid #f0f0f0;font-size:11px;color:#555}
.trow.b{color:#25a244;font-weight:700}
.trow.g{font-size:13px;font-weight:700;color:#111;
  border-top:2px solid #111;border-bottom:none;margin-top:3px;padding-top:5px}
.ofoot{margin-top:14px;padding-top:10px;border-top:1px solid #eee;
  display:flex;justify-content:space-between;align-items:flex-end}
.ofootxt{font-size:9px;color:#888;line-height:1.5}
.ofootxt b{color:#111;font-size:10px;display:block}
.sig{border-top:1px solid #bbb;width:120px;text-align:center;
  padding-top:3px;font-size:8px;color:#aaa}

/* ── PRINT CSS ──────────────────────────── */
@media print{
  #hdr,#chips,#main,#bot,#cov,#csh{display:none!important}
  #psh{position:static!important;background:none!important;display:block!important}
  .pdiv{border-radius:0!important;max-height:none!important}
  .phdr{display:none!important}
  .pbody{overflow:visible!important;padding:0!important}
}
</style>
</head>

      oninput="onSearch(this.value)" onsearch="onSearch(this.value)">

  <button id="cfab" onclick="openCart()">&#128722; <span id="cbadge">0</span></button>

<!-- CATEGORY CHIPS -->
<div id="chips">

<button class="chip" data-cat="Lucidi Top Gloss" onclick="filterCat('Lucidi Top Gloss',this)">🌟 Lucidi Top Gloss <span class="cnt">23</span></button>
<button class="chip" data-cat="Dual Form & Tip" onclick="filterCat('Dual Form & Tip',this)">💎 Dual Form & Tip <span class="cnt">45</span></button>
<button class="chip" data-cat="Attrezzature" onclick="filterCat('Attrezzature',this)">🔧 Attrezzature <span class="cnt">150</span></button>
<button class="chip" data-cat="Lime & Buffer" onclick="filterCat('Lime & Buffer',this)">📋 Lime & Buffer <span class="cnt">18</span></button>
<button class="chip" data-cat="Nail Art & Decorazioni" onclick="filterCat('Nail Art & Decorazioni',this)">🌸 Nail Art & Decorazioni <span class="cnt">241</span></button>

<button class="chip" data-cat="Pedicure" onclick="filterCat('Pedicure',this)">🦶 Pedicure <span class="cnt">1</span></button>

</div>

<!-- MAIN SCROLL AREA -->
<div id="main" onscroll="onScroll(this)">
  <div id="lbl"></div>
  <div id="grid">
    <div id="nores"><b>&#128269;</b>Nessun prodotto trovato</div>
  </div>
  <div id="lmore"><button id="lmbtn" onclick="loadMore()">Carica altri &#8595;</button></div>
  <div style="height:8px"></div>
</div>

<!-- BOTTOM BAR -->
<div id="bot">
  <div class="bi"><strong id="btot">&#8364;0,00</strong><span id="bitem">0 articoli</span></div>
  <button id="obtn" onclick="openCart()">Vedi ordine &#8594;</button>
</div>

<!-- CART OVERLAY -->
<div id="cov" onclick="closeCart()"></div>

<!-- CART SHEET -->
<div id="csh">
  <div class="pill"></div>
  <div class="shdr">
    <h2>&#128722; Il tuo ordine</h2>
    <button onclick="closeCart()">&#10005;</button>
  </div>
  <div class="sbody" id="sbody"></div>
  <div class="sfoot">
    <div class="tbox" id="tbox"></div>
    <textarea id="note" placeholder="Note ordine (opzionale)..."></textarea>
    <div class="abtns">
      <button class="abtn bwa" onclick="goWA()">&#128172; Invia su WhatsApp</button>
      <button class="abtn bml" onclick="goMail()">&#128231; Invia per Email</button>
      <button class="abtn bpr" onclick="openPrint()">&#128196; Genera PDF / Stampa</button>
      <button class="abtn bcl" onclick="clearCart()">&#128465; Svuota carrello</button>
    </div>
  </div>
</div>

<!-- PRINT / PDF SHEET -->
<div id="psh">
  <div class="pdiv">
    <div class="phdr">
      <h3>&#128196; Anteprima ordine</h3>
      <button class="pbtn" onclick="doPrint()">&#128247; Stampa / Salva PDF</button>
      <button class="pclose" onclick="closePrint()">&#10005;</button>
    </div>
    <div class="pbody" id="pbody"></div>
  </div>
</div>

i-3-basi-colorate"}, {"id": 964, "cat": "Kit in Offerta", "nome": "Kit Foil 02 - Set Pellicole per decorazione Unghie", "prezzo": 7.9, "prezzo_str": "7,90 €", "old_prezzo": 0, "old_str": "", "promo": "", "img": "https://www.hdnails.it/media/catalog/product/cache/4916658b69d7adec09a62164059f7d76/w/o/woo_img_69609625b2d4f_1.jpg", "link": "https://www.hdnails.it/kit-foil-02-set-pellicole-per-decorazione-unghie"}];
var CI={"Gel da Ricostruzione": "💅", "Base Gel & Semipermanente": "💜", "Smalti Semipermanenti": "🎨", "Color Gel": "🌈", "Acrygel": "✨", "Preparatori & Liquidi": "🧴", "Lucidi Top Gloss": "🌟", "Dual Form & Tip": "💎", "Attrezzature": "🔧", "Lime & Buffer": "📋", "Nail Art & Decorazioni": "🌸", "Trattamento Mani": "🤲", "Pedicure": "🦶", "Kit in Offerta": "🎁"};
var PG=30,cat='ALL',q='',cart={},vis=0,filt=[];

/* ── helpers ─────────────────────────── */
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fm(n){return '\u20ac'+n.toFixed(2).replace('.',',')}

/* ── filter ──────────────────────────── */
function getFilt(){
  var ql=q.toLowerCase();
  return P.filter(function(p){
    return (cat==='ALL'||p.cat===cat) &&
           (!ql||p.nome.toLowerCase().indexOf(ql)!==-1||p.cat.toLowerCase().indexOf(ql)!==-1);
  });
}

/* ── build card DOM ──────────────────── */
function mkCard(p){
  var qty=cart[p.id]||0, inC=qty>0;
  var d=document.createElement('div'); d.className='card';

  // image
  var ci=document.createElement('div'); ci.className='ci';
  if(p.img){
    var im=document.createElement('img');
    im.loading='lazy'; im.alt=''; im.src=p.img;
    im.onerror=function(){ci.innerHTML='<div class="ph">&#128133;</div>';};
    ci.appendChild(im);
  } else { ci.innerHTML='<div class="ph">&#128133;</div>'; }
  d.appendChild(ci);

  if(p.promo){var bg=document.createElement('div');bg.className='bge';bg.textContent=p.promo;d.appendChild(bg);}

  // body
  var cb=document.createElement('div'); cb.className='cb';
  var cn=document.createElement('div'); cn.className='cn'; cn.textContent=p.nome; cb.appendChild(cn);
  var pr=document.createElement('div'); pr.className='pr'; pr.textContent=p.prezzo_str;
  if(p.old_prezzo){var op=document.createElement('span');op.className='op';op.textContent=p.old_str;pr.appendChild(op);}
  cb.appendChild(pr); d.appendChild(cb);

  // footer
  var cf=document.createElement('div'); cf.className='cf';
  var qb=document.createElement('div'); qb.className='qb';
  var qm=document.createElement('button'); qm.className='qmn'; qm.textContent='\u2212';
  qm.setAttribute('onclick','chQ('+p.id+',-1)');
  var qn=document.createElement('span'); qn.className='qn'; qn.id='qn'+p.id; qn.textContent=qty;
  var qpl=document.createElement('button'); qpl.className='qpl'; qpl.textContent='+';
  qpl.setAttribute('onclick','chQ('+p.id+',1)');
  qb.appendChild(qm); qb.appendChild(qn); qb.appendChild(qpl);
  var ab=document.createElement('button');
  ab.className='ab '+(inC?'on':'off');
  ab.id='ab'+p.id;
  ab.textContent=inC?'\u2713 Aggiunto':'+ Carrello';
  ab.setAttribute('onclick','chQ('+p.id+',1)');
  cf.appendChild(qb); cf.appendChild(ab); d.appendChild(cf);
  return d;
}

/* ── render ──────────────────────────── */
function render(){
  filt=getFilt(); vis=0;
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var lbl=document.getElementById('lbl');
  var icon=cat==='ALL'?'&#127717;':(CI[cat]||'');
  lbl.innerHTML=icon+' '+(cat==='ALL'?'Tutti i prodotti':E(cat))+
    (filt.length?' <span style="font-weight:400;color:var(--txt3)">('+filt.length+')</span>':'');
  if(!filt.length){grid.innerHTML='<div id="nores"><b>&#128269;</b>Nessun risultato</div>';
    document.getElementById('lmore').style.display='none'; return;}
  loadMore();
}

function loadMore(){
  var grid=document.getElementById('grid');
  var prev=vis;
  vis=Math.min(vis+PG,filt.length);
  var fr=document.createDocumentFragment();
  for(var i=prev;i<vis;i++) fr.appendChild(mkCard(filt[i]));
  grid.appendChild(fr);
  var lm=document.getElementById('lmore');
  if(vis<filt.length){
    lm.style.display='block';
    document.getElementById('lmbtn').textContent='Carica altri '+Math.min(PG,filt.length-vis)+' \u2193';
  } else { lm.style.display='none'; }
}

function onScroll(el){
  if(el.scrollHeight-el.scrollTop-el.clientHeight<250 && vis<filt.length) loadMore();
}

/* ── qty ─────────────────────────────── */
function chQ(id,d){
  var n=Math.max(0,(cart[id]||0)+d);
  if(n===0) delete cart[id]; else cart[id]=n;
  var qn=document.getElementById('qn'+id);
  var ab=document.getElementById('ab'+id);
  if(qn) qn.textContent=n;
  if(ab){ab.textContent=n?'\u2713 Aggiunto':'+ Carrello';ab.className='ab '+(n?'on':'off');}
  updBadge();
  if(document.getElementById('csh').classList.contains('on')) renderCart();
}
function updBadge(){
  var tot=0,sub=0;
  Object.keys(cart).forEach(function(id){tot+=cart[id];sub+=P[id].prezzo*cart[id];});
  document.getElementById('cbadge').textContent=tot;
  var bot=document.getElementById('bot');
  if(tot>0){
    bot.style.display='flex';
    document.getElementById('btot').textContent=fm(sub);
    document.getElementById('bitem').textContent=tot+(tot===1?' articolo':' articoli');
  } else { bot.style.display='none'; }
}

/* ── cart sheet ──────────────────────── */
function openCart(){renderCart();document.getElementById('csh').classList.add('on');document.getElementById('cov').classList.add('on');}
function closeCart(){document.getElementById('csh').classList.remove('on');document.getElementById('cov').classList.remove('on');}
function renderCart(){
  var sb=document.getElementById('sbody'), tb=document.getElementById('tbox');
  var ids=Object.keys(cart);
  if(!ids.length){sb.innerHTML='<div class="ce"><b>&#128722;</b>Nessun prodotto aggiunto</div>';tb.innerHTML='';return;}
  var sub=0, h='';
  ids.forEach(function(id){
    var p=P[id],qty=cart[id],line=p.prezzo*qty; sub+=line;
    var img=p.img?'<img class="cthumb" src="'+p.img+'" loading="lazy">'
                 :'<div class="cthph">&#128133;</div>';
    h+='<div class="citem">'+img+'<div class="cinf">'+
        '<div class="cname">'+E(p.nome)+'</div>'+
        '<div class="cprice">'+p.prezzo_str+'</div>'+
        '<div class="cqrow">'+
          '<button class="cqm" onclick="chQ('+id+',-1)">&#8722;</button>'+
          '<span class="cqv">'+qty+'</span>'+
          '<button class="cqp" onclick="chQ('+id+',1)">+</button>'+
          '<span class="cqt">= '+fm(line)+'</span>'+
        '</div></div>'+
        '<button class="cdel" onclick="delItem('+id+')">&#10005;</button></div>';
  });
  sb.innerHTML=h;
  var bon=sub*0.10,tot=0; Object.values(cart).forEach(function(v){tot+=v;});
  tb.innerHTML='<div class="tr"><span>Subtotale ('+tot+' art.)</span><span>'+fm(sub)+'</span></div>'+
    '<div class="tr bon"><span>&#127873; Bonus 10% in prodotto</span><span>+'+fm(bon)+'</span></div>'+
    '<div class="tr grand"><span>Totale</span><span>'+fm(sub)+'</span></div>';
}
function delItem(id){
  delete cart[id];
  var qn=document.getElementById('qn'+id); if(qn) qn.textContent='0';
  var ab=document.getElementById('ab'+id); if(ab){ab.textContent='+ Carrello';ab.className='ab off';}
  updBadge(); renderCart();
}
function clearCart(){
  Object.keys(cart).forEach(function(id){
    var qn=document.getElementById('qn'+id); if(qn) qn.textContent='0';
    var ab=document.getElementById('ab'+id); if(ab){ab.textContent='+ Carrello';ab.className='ab off';}
  });
  cart={}; updBadge(); renderCart(); closeCart();
}

/* ── filter / search ─────────────────── */
function filterCat(c,btn){
  cat=c;
  document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on');});
  if(btn){btn.classList.add('on');btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  render(); document.getElementById('main').scrollTop=0;
}
function onSearch(v){
  q=v; document.getElementById('qclear').style.display=v?'block':'none';
  if(v){cat='ALL';document.querySelectorAll('.chip').forEach(function(b){b.classList.remove('on');});
    var ac=document.querySelector('[data-cat="ALL"]');if(ac)ac.classList.add('on');}
  render();
}
function clearSearch(){
  document.getElementById('q').value=''; onSearch('');
}

/* ── WhatsApp ────────────────────────── */
function goWA(){
  var ids=Object.keys(cart);
  if(!ids.length){alert('Aggiungi prodotti al carrello prima di inviare.');return;}
  var sub=0,msg='*ORDINE HD NAILS*\nAccademia di Savona\n\n';
  ids.forEach(function(id){
    var p=P[id],qty=cart[id],line=p.prezzo*qty; sub+=line;
    msg+=qty+'x '+p.nome+' = '+fm(line)+'\n';
  });
  var bon=sub*0.10;
  msg+='\nSubtotale: '+fm(sub)+'\nBonus 10% in prodotto: +'+fm(bon)+'\nTOTALE: '+fm(sub);
  var n=document.getElementById('note').value;
  if(n) msg+='\n\nNote: '+n;
  msg+='\n\nData: '+new Date().toLocaleDateString('it-IT');
  window.open('https://wa.me/?text='+encodeURIComponent(msg));
}

/* ── Email ───────────────────────────── */
function goMail(){
  var ids=Object.keys(cart);
  if(!ids.length){alert('Aggiungi prodotti al carrello prima di inviare.');return;}
  var sub=0,body='ORDINE HD NAILS - Accademia di Savona%0D%0A%0D%0A';
  ids.forEach(function(id){
    var p=P[id],qty=cart[id],line=p.prezzo*qty; sub+=line;
    body+=qty+'x '+encodeURIComponent(p.nome)+' = EUR '+line.toFixed(2).replace('.',',')+'%0D%0A';
  });
  var bon=sub*0.10;
  body+='%0D%0ATOTALE: EUR '+sub.toFixed(2).replace('.',',')+'%0D%0ABonus 10%25 in prodotto: +EUR '+bon.toFixed(2).replace('.',',');
  var n=document.getElementById('note').value;
  if(n) body+='%0D%0ANote: '+encodeURIComponent(n);
  window.open('mailto:?subject='+encodeURIComponent('Ordine HD Nails '+new Date().toLocaleDateString('it-IT'))+'&body='+body);
}
