<!DOCTYPE html>
<html lang="it">
<head>

<title>HD Ordini</title>
<style>
html,body{height:100%;margin:0;background:#1a1a1a;color:#d4a574;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center}
.box{padding:28px}.logo{font-size:34px;font-weight:900;letter-spacing:2px}.sub{margin-top:10px;color:#fff;font-size:14px;opacity:.75}.btn{margin-top:22px;display:inline-block;background:#d4a574;color:#1a1a1a;text-decoration:none;border-radius:14px;padding:13px 18px;font-weight:800}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').finally(function(){
      setTimeout(function(){ location.replace('./ORDINIACCADEMIA_descrizioni.html'); }, 500);
    });
  });
}else{
  location.replace('./ORDINIACCADEMIA_descrizioni.html');
}
</script>
</head>

<div class="box">
  <div class="logo">HD NAILS</div>
  <div class="sub">Caricamento app ordini...</div>

</div>
